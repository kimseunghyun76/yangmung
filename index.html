<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#b9382e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>yangmung</title>
    <style>
      /* ── 디자인 토큰 (주간/야간) — 볼드 모던: 화이트+잉크+朱, 굵은 테두리·하드 섀도 ── */
      :root {
        --bg: #f4f3ed;
        --surface: #ffffff;
        --surface-2: #edeae1;
        --ink: #15140f;           /* 잉크(고대비) */
        --ink-soft: #57544c;
        --ink-faint: #948f84;
        --line: #e0dcd0;          /* 약한 구분선 */
        --border: #15140f;        /* 청키 테두리 = 잉크 */
        --accent: #b9382e;        /* 朱 (볼드) */
        --accent-soft: #fbe8e5;
        --accent-ink: #ffffff;
        --ok: #2f7d4f; --ok-soft: #e3f0e6;
        --warn: #9a6a16; --warn-soft: #f4ecd6;
        --shadow-pop: 4px 4px 0 var(--ink);      /* 하드 오프셋 섀도 (청키 팝) */
        --shadow-pop-sm: 3px 3px 0 var(--ink);
        --shadow-card: none;
        --shadow-raised: 4px 4px 0 var(--ink);
        --hero: #15140f;
        /* Liquid Glass 레이어 (라이트) */
        --glass-bg: rgba(255,255,255,0.55);
        --glass-bg-strong: rgba(255,255,255,0.72);
        --glass-border: rgba(255,255,255,0.7);
        --glass-hi: rgba(255,255,255,0.9);
        --glass-shadow: 0 8px 30px rgba(40,30,20,0.10), 0 2px 8px rgba(40,30,20,0.06);
        --glass-blur: 22px;
        /* 앰비언트 배경 블롭 */
        --amb-1: rgba(185,56,46,0.16);   /* 朱 */
        --amb-2: rgba(70,120,200,0.14);  /* cool */
        --amb-3: rgba(220,160,60,0.12);  /* warm */
      }
      [data-theme="dark"] {
        --bg: #100f0b;
        --surface: #1b1913;
        --surface-2: #262318;
        --ink: #f3efe6;
        --ink-soft: #aaa698;
        --ink-faint: #6f6b5e;
        --line: #2c2920;
        --border: #4f4b3f;        /* 다크에선 보이는 중간 테두리 */
        --accent: #e2655a;
        --accent-soft: #2c1c19;
        --accent-ink: #15140f;
        --ok: #4cae79; --ok-soft: #18241c;
        --warn: #d2a14a; --warn-soft: #271f12;
        --shadow-pop: 4px 4px 0 rgba(0,0,0,0.55);
        --shadow-pop-sm: 3px 3px 0 rgba(0,0,0,0.55);
        --shadow-card: none;
        --shadow-raised: 4px 4px 0 rgba(0,0,0,0.55);
        --hero: #262318;
        /* Liquid Glass 레이어 (다크) */
        --glass-bg: rgba(40,38,30,0.45);
        --glass-bg-strong: rgba(45,42,33,0.62);
        --glass-border: rgba(255,255,255,0.12);
        --glass-hi: rgba(255,255,255,0.16);
        --glass-shadow: 0 10px 34px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.4);
        --glass-blur: 22px;
        --amb-1: rgba(226,101,90,0.18);
        --amb-2: rgba(90,140,220,0.16);
        --amb-3: rgba(220,170,90,0.10);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--ink);
        /* SF(애플) 우선 시스템 폰트 스택 */
        font-family: -apple-system, BlinkMacSystemFont, ui-sans-serif, system-ui, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
        font-size: 17px;               /* iOS 본문 기본 */
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;   /* iOS 회색 탭 플래시 제거 */
        -webkit-text-size-adjust: 100%;
        transition: background 0.25s ease, color 0.25s ease;
      }
      /* 앰비언트 배경 — 글래스가 굴절할 부드러운 색 블롭 (고정) */
      .ym-ambient { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
      .ym-ambient::before, .ym-ambient::after {
        content: ''; position: absolute; border-radius: 50%; filter: blur(60px);
      }
      .ym-ambient::before { width: 60vw; height: 60vw; top: -12vh; right: -18vw;
        background: radial-gradient(circle at center, var(--amb-1), transparent 70%); }
      .ym-ambient::after { width: 66vw; height: 66vw; bottom: -16vh; left: -20vw;
        background: radial-gradient(circle at center, var(--amb-2), transparent 70%); }
      .ym-ambient i { position: absolute; width: 50vw; height: 50vw; left: 30vw; top: 32vh;
        border-radius: 50%; filter: blur(60px);
        background: radial-gradient(circle at center, var(--amb-3), transparent 70%); }
      /* Liquid Glass 머티리얼 */
      .ym-glass {
        background: var(--glass-bg);
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
        backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-hi);
        border-radius: 24px;
      }
      .ym-glass-strong { background: var(--glass-bg-strong); }
      /* 스프링 등장 모션 + 누름 반응 */
      @keyframes ym-rise { from { opacity: 0; transform: translateY(16px) scale(0.985); } to { opacity: 1; transform: none; } }
      .ym-rise { animation: ym-rise 0.5s cubic-bezier(.2,.8,.2,1) both; }
      .ym-press { transition: transform 0.12s cubic-bezier(.2,.8,.2,1), box-shadow 0.15s ease; }
      .ym-press:not(:disabled):active { transform: scale(0.965); }
      /* iOS 터치 타깃 최소 44pt 권장 (HIG) */
      button { min-height: 44px; }
      /* 볼드 모던: 크고 무거운 타이포, 타이트 자간 */
      h1 { font-size: 32px; font-weight: 820; letter-spacing: -0.035em; line-height: 1.08; }
      h2 { font-size: 20px; font-weight: 780; letter-spacing: -0.02em; }
      /* 섹션 라벨(키커) — 굵고 또렷하게 */
      .ym-kicker { font-size: 12px; font-weight: 800; letter-spacing: 0.02em; color: var(--ink); display: inline-flex; align-items: center; gap: 7px; }
      .ym-kicker::before { content: ''; width: 12px; height: 12px; background: var(--accent); border-radius: 3px; display: inline-block; }
      /* 구분선 */
      .ym-rule { height: 1px; background: var(--line); border: 0; margin: 0; }
      /* 하드섀도 버튼/블록 — 누르면 섀도 안으로 들어가는 청키 인터랙션 */
      .ym-pop { box-shadow: var(--shadow-pop); transition: transform 0.06s ease, box-shadow 0.06s ease; }
      .ym-pop:not(:disabled):active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
      .ym-pop-sm { box-shadow: var(--shadow-pop-sm); transition: transform 0.06s ease, box-shadow 0.06s ease; }
      .ym-pop-sm:not(:disabled):active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
      button { font-family: inherit; transition: transform 0.08s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease; }
      button:not(:disabled):active { transform: translateY(1px) scale(0.995); }

      /* 마이크로 인터랙션 — 학습 피드백 강화 (CSS only) */
      @keyframes ym-pop { 0% { transform: scale(1); } 40% { transform: scale(1.04); } 100% { transform: scale(1); } }
      @keyframes ym-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
      @keyframes ym-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes ym-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes ym-burst { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes ym-confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(120px) rotate(360deg); opacity: 0; } }
      @keyframes ym-wave { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
      /* 장면 진입 — 헤더 배경은 스케일 페이드, 학습 시트는 아래에서 떠오름 */
      @keyframes ym-scene-bg { from { opacity: 0; transform: scale(1.06); } to { opacity: 1; transform: none; } }
      @keyframes ym-sheet-up { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: none; } }
      .ym-scene-bg { animation: ym-scene-bg 0.55s cubic-bezier(.2,.8,.2,1) both; }
      .ym-sheet-up { animation: ym-sheet-up 0.5s cubic-bezier(.2,.8,.2,1) both; }
      /* 가챠 개봉 — 상자 흔들→팝, 카드 플립 등장, 글로우 펄스 */
      @keyframes ym-chest { 0%{transform:scale(.92) rotate(0)} 18%{transform:scale(1) rotate(-5deg)} 34%{transform:scale(1.02) rotate(5deg)} 52%{transform:scale(1.02) rotate(-4deg)} 70%{transform:scale(1.06) rotate(3deg)} 100%{transform:scale(1.18); opacity:0} }
      @keyframes ym-card-in { from{opacity:0; transform:translateY(18px) scale(.7) rotate(-7deg)} to{opacity:1; transform:none} }
      @keyframes ym-item-out { 0%{opacity:0; transform:translateY(150px) scale(.25) rotate(-9deg)} 62%{opacity:1; transform:translateY(-12px) scale(1.08) rotate(2deg)} 100%{opacity:1; transform:none} }
      @keyframes ym-glow { 0%,100%{opacity:.35; transform:scale(.9)} 50%{opacity:.9; transform:scale(1.08)} }
      @keyframes ym-gacha-spark { 0%{opacity:0; transform:translate(-50%, -50%) scale(.2) rotate(0)} 18%{opacity:1} 100%{opacity:0; transform:translate(var(--dx, 0), -110px) scale(1.2) rotate(240deg)} }
      @keyframes ym-gacha-rays { 0%{opacity:0; transform:scale(.6) rotate(0)} 22%{opacity:.9} 100%{opacity:.18; transform:scale(1.18) rotate(18deg)} }
      @keyframes ym-gacha-box-hit { 0%{transform:translateY(0) rotate(0) scale(1)} 22%{transform:translateY(-8px) rotate(-8deg) scale(1.08)} 44%{transform:translateY(3px) rotate(7deg) scale(1.03)} 72%{transform:translateY(-3px) rotate(-4deg) scale(1.06)} 100%{transform:translateY(0) rotate(0) scale(1)} }
      @keyframes ym-gacha-shockwave { 0%{opacity:.9; transform:translate(-50%,-50%) scale(.18)} 70%{opacity:.3} 100%{opacity:0; transform:translate(-50%,-50%) scale(1.45)} }
      @keyframes ym-gacha-runes { from{background-position:0 0; opacity:.16} to{background-position:0 -120px; opacity:.32} }
      @keyframes ym-game-card-pop { 0%{opacity:0; transform:perspective(600px) translateY(116px) rotateX(68deg) scale(.34)} 46%{opacity:1; transform:perspective(600px) translateY(-24px) rotateX(-10deg) scale(1.12)} 70%{transform:perspective(600px) translateY(6px) rotateX(4deg) scale(.98)} 100%{opacity:1; transform:perspective(600px) translateY(0) rotateX(0) scale(1)} }
      @keyframes ym-game-card-shine { from{transform:translateX(-130%) rotate(18deg)} to{transform:translateX(155%) rotate(18deg)} }
      @keyframes ym-game-card-float { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-4px) rotate(1deg)} }
      @keyframes ym-gacha-flip { 0%{opacity:.55; transform:perspective(760px) rotateY(0) scale(.96)} 42%{opacity:1; transform:perspective(760px) rotateY(88deg) scale(1.04)} 56%{transform:perspective(760px) rotateY(92deg) scale(1.08)} 100%{opacity:1; transform:perspective(760px) rotateY(0) scale(1)} }
      @keyframes ym-gacha-rare-aura { 0%,100%{opacity:.48; transform:scale(.92) rotate(0)} 50%{opacity:.95; transform:scale(1.1) rotate(8deg)} }
      @keyframes ym-gacha-rare-flip { 0%{opacity:.7; transform:perspective(760px) rotateY(0) scale(.96)} 42%{opacity:1; transform:perspective(760px) rotateY(88deg) scale(1.035)} 58%{transform:perspective(760px) rotateY(92deg) scale(1.06); filter:drop-shadow(0 0 18px var(--rarity-color,#f0a23a))} 100%{opacity:1; transform:perspective(760px) rotateY(0) scale(1); filter:drop-shadow(0 0 10px color-mix(in srgb, var(--rarity-color,#f0a23a), transparent 30%))} }
      @keyframes ym-gacha-rare-sheen { from{background-position:-180% 0, 0 0, 0 0} to{background-position:220% 0, 0 0, 0 0} }
      @keyframes ym-gacha-rare-burst { 0%{opacity:0; transform:translate(-50%,-50%) scale(.45) rotate(-7deg)} 22%{opacity:1; transform:translate(-50%,-50%) scale(1.16) rotate(2deg)} 62%{opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0)} 100%{opacity:0; transform:translate(-50%,-58%) scale(1.08) rotate(0)} }
      @keyframes ym-gacha-rare-back { 0%,100%{filter:brightness(1) saturate(1); transform:translateY(0) rotate(-.4deg)} 50%{filter:brightness(1.32) saturate(1.35); transform:translateY(-2px) rotate(.5deg)} }
      @keyframes ym-gacha-back-rainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
      @keyframes ym-gacha-starfall { 0%{opacity:0; transform:translateY(-20px) scale(.4) rotate(0)} 20%{opacity:1} 100%{opacity:0; transform:translateY(80px) scale(1.05) rotate(160deg)} }
      @keyframes ym-gacha-ready-spin { 0%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} 100%{transform:rotate(-2deg)} }
      @keyframes ym-gacha-spotlight-pop { 0%{opacity:0; transform:translate(-50%,-50%) scale(.58) rotateY(0)} 26%{opacity:1; transform:translate(-50%,-50%) scale(1.08) rotateY(0)} 46%{transform:translate(-50%,-50%) scale(1.02) rotateY(86deg)} 66%{transform:translate(-50%,-50%) scale(1.16) rotateY(0)} 100%{opacity:1; transform:translate(-50%,-50%) scale(1) rotateY(0)} }
      @keyframes ym-gacha-bulk-fan { 0%{opacity:0; transform:translateY(-38px) scale(.72) rotate(-14deg)} 56%{opacity:1; transform:translateY(10px) scale(1.08) rotate(4deg)} 100%{opacity:1; transform:none} }
      @keyframes ym-gacha-pile-idle { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-5px) rotate(1deg)} }
      @keyframes ym-gacha-merge-burst { 0%{opacity:0; transform:translate(-50%,-50%) scale(.28) rotate(-18deg)} 18%{opacity:1} 70%{opacity:.82; transform:translate(-50%,-50%) scale(1.02) rotate(8deg)} 100%{opacity:0; transform:translate(-50%,-50%) scale(1.28) rotate(18deg)} }
      @keyframes ym-gacha-merge-host { 0%{transform:scale(1)} 30%{transform:scale(1.025)} 100%{transform:scale(1)} }
      @keyframes ym-gacha-merge-btn { 0%,100%{box-shadow:0 0 0 rgba(185,56,46,0)} 50%{box-shadow:0 0 18px rgba(185,56,46,.34)} }
      /* ── 가챠폰 머신 (ガチャガチャ) — CSS 셀셰이딩, 일본 망가 톤 ── */
      @keyframes ym-gpn-ball-jolt { 0%{transform:translate(0,0) rotate(0)} 32%{transform:translate(var(--jx,5px), calc(var(--jy,-12px))) rotate(46deg)} 62%{transform:translate(calc(var(--jx,5px)*-.7), calc(var(--jy,-12px)*.3)) rotate(-28deg)} 100%{transform:translate(0,0) rotate(0)} }
      @keyframes ym-gpn-ball-orbit { 0%{transform:rotate(var(--ang,0deg)) translateX(var(--orbit,30px)) rotate(calc(var(--ang,0deg)*-1))} 100%{transform:rotate(calc(var(--ang,0deg) + 360deg)) translateX(var(--orbit,30px)) rotate(calc((var(--ang,0deg) + 360deg)*-1))} }
      @keyframes ym-gpn-ball-tumble { 0%{transform:translate3d(0,0,0) rotate(var(--cap-rot,-10deg)) scale(var(--cap-scale,1))} 18%{transform:translate3d(var(--tx1,18px),var(--ty1,-14px),0) rotate(calc(var(--cap-rot,-10deg) + 76deg)) scale(calc(var(--cap-scale,1) * 1.08))} 37%{transform:translate3d(var(--tx2,-24px),var(--ty2,8px),0) rotate(calc(var(--cap-rot,-10deg) + 164deg)) scale(calc(var(--cap-scale,1) * .92))} 62%{transform:translate3d(var(--tx3,12px),var(--ty3,18px),0) rotate(calc(var(--cap-rot,-10deg) + 246deg)) scale(calc(var(--cap-scale,1) * 1.04))} 82%{transform:translate3d(calc(var(--tx1,18px)*-.45),calc(var(--ty2,8px)*.55),0) rotate(calc(var(--cap-rot,-10deg) + 312deg)) scale(calc(var(--cap-scale,1) * .96))} 100%{transform:translate3d(0,0,0) rotate(calc(var(--cap-rot,-10deg) + 360deg)) scale(var(--cap-scale,1))} }
      @keyframes ym-gpn-dome-vortex { from{transform:rotate(0deg) scale(1); opacity:.18} 50%{opacity:.34} to{transform:rotate(360deg) scale(1.04); opacity:.18} }
      @keyframes ym-mcard-art-pulse { 0%,100%{opacity:.42; transform:translate(-50%,-50%) scale(.92) rotate(0)} 50%{opacity:.84; transform:translate(-50%,-50%) scale(1.08) rotate(10deg)} }
      @keyframes ym-mcard-item-float { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3px) scale(1.025)} }
      @keyframes ym-gpn-crank-pulse { 0%,100%{transform:rotate(0)} 50%{transform:rotate(14deg)} }
      @keyframes ym-gpn-crank-turn { 0%{transform:rotate(calc(var(--tap-count,0) * 51deg - 58deg)) scale(.92)} 54%{transform:rotate(calc(var(--tap-count,0) * 51deg + 34deg)) scale(1.08)} 100%{transform:rotate(calc(var(--tap-count,0) * 51deg)) scale(1)} }
      @keyframes ym-gpn-chute-ready { 0%,100%{opacity:.2; transform:translateX(-50%) scaleX(.78)} 50%{opacity:.84; transform:translateX(-50%) scaleX(1)} }
      @keyframes ym-gpn-machine-jolt { 0%,100%{transform:translate(0,0)} 28%{transform:translate(-2px,1px)} 56%{transform:translate(2px,-1px)} 80%{transform:translate(-1px,0)} }
      @keyframes ym-gpn-machine-run { 0%,100%{filter:drop-shadow(0 18px 24px rgba(0,0,0,.35)) saturate(1.05); transform:translateY(0)} 25%{filter:drop-shadow(0 0 22px var(--gacha-color,#e55c4f)) drop-shadow(0 18px 24px rgba(0,0,0,.35)) saturate(1.18); transform:translateY(-2px)} 52%{transform:translateY(1px)} 78%{transform:translateY(-1px)} }
      @keyframes ym-gpn-touch-spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
      @keyframes ym-gpn-capsule-mystery { 0%,100%{filter:drop-shadow(0 0 20px var(--cap,#e55c4f)) brightness(1); transform:scale(1)} 50%{filter:drop-shadow(0 0 36px var(--cap,#e55c4f)) brightness(1.16); transform:scale(1.035)} }
      @keyframes ym-gpn-cap-drop { 0%{transform:translateY(-170px) scale(.78); opacity:0} 50%{transform:translateY(10px) scale(1.05); opacity:1} 68%{transform:translateY(-16px) scale(.99)} 84%{transform:translateY(4px) scale(1.01)} 100%{transform:translateY(0) scale(1)} }
      @keyframes ym-gpn-cap-wobble { 0%,100%{transform:rotate(0)} 22%{transform:rotate(-10deg)} 50%{transform:rotate(8deg)} 78%{transform:rotate(-5deg)} }
      @keyframes ym-gpn-half-top { 0%{transform:translate(0,0) rotate(0); opacity:1} 100%{transform:translate(-52px,-130px) rotate(-56deg); opacity:0} }
      @keyframes ym-gpn-half-bottom { 0%{transform:translate(0,0) rotate(0); opacity:1} 100%{transform:translate(44px,96px) rotate(40deg); opacity:0} }
      @keyframes ym-manga-lines-in { 0%{opacity:0; transform:scale(.5) rotate(0)} 16%{opacity:1} 100%{opacity:0; transform:scale(1.32) rotate(10deg)} }
      @keyframes ym-manga-sfx-pop { 0%{opacity:0; transform:translate(-50%,-50%) scale(.36) rotate(-10deg)} 24%{opacity:1; transform:translate(-50%,-50%) scale(1.22) rotate(4deg)} 56%{opacity:1; transform:translate(-50%,-50%) scale(1) rotate(-2deg)} 100%{opacity:0; transform:translate(-50%,-66%) scale(1.05) rotate(0)} }
      @keyframes ym-gpn-card-spill { 0%{opacity:0; transform:translateY(-90px) scale(.5) rotate(var(--spill-rot,-12deg))} 58%{opacity:1; transform:translateY(8px) scale(1.06) rotate(calc(var(--spill-rot,-12deg)*-.4))} 100%{opacity:1; transform:none} }
      @keyframes ym-gacha-card-settle { 0%{opacity:0; transform:translateY(-18px) scale(.82)} 70%{opacity:1; transform:translateY(4px) scale(1.04)} 100%{opacity:1; transform:none} }
      .ym-gpn-machine { position:relative; display:flex; flex-direction:column; align-items:center; filter:drop-shadow(0 16px 26px rgba(0,0,0,.4)); }
      .ym-gpn-machine.is-jolt { animation: ym-gpn-machine-jolt .3s ease-out both; }
      .ym-gpn-dome { position:relative; width:172px; height:128px; border-radius:86px 86px 18px 18px; overflow:hidden;
        background: linear-gradient(168deg, rgba(255,255,255,.34), rgba(214,232,255,.14) 38%, rgba(150,180,220,.18));
