<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>yangmung</title>
    <style>
      /* ── 디자인 토큰 (주간/야간) — 볼드 모던: 화이트+잉크+朱, 굵은 테두리·하드 섀도 ── */
      :root {
        --bg: #f4f3ed;
        --surface: #ffffff;
        --surface-2: #edeae1;
        --ink: #15140f;           /* 잉크(고대비) */
        --ink-soft: #57544c;
        --ink-faint: #948f84;
        --line: #e0dcd0;          /* 약한 구분선 */
        --border: #15140f;        /* 청키 테두리 = 잉크 */
        --accent: #b9382e;        /* 朱 (볼드) */
        --accent-soft: #fbe8e5;
        --accent-ink: #ffffff;
        --ok: #2f7d4f; --ok-soft: #e3f0e6;
        --warn: #9a6a16; --warn-soft: #f4ecd6;
        --shadow-pop: 4px 4px 0 var(--ink);      /* 하드 오프셋 섀도 (청키 팝) */
        --shadow-pop-sm: 3px 3px 0 var(--ink);
        --shadow-card: none;
        --shadow-raised: 4px 4px 0 var(--ink);
        --hero: #15140f;
      }
      [data-theme="dark"] {
        --bg: #100f0b;
        --surface: #1b1913;
        --surface-2: #262318;
        --ink: #f3efe6;
        --ink-soft: #aaa698;
        --ink-faint: #6f6b5e;
        --line: #2c2920;
        --border: #4f4b3f;        /* 다크에선 보이는 중간 테두리 */
        --accent: #e2655a;
        --accent-soft: #2c1c19;
        --accent-ink: #15140f;
        --ok: #4cae79; --ok-soft: #18241c;
        --warn: #d2a14a; --warn-soft: #271f12;
        --shadow-pop: 4px 4px 0 rgba(0,0,0,0.55);
        --shadow-pop-sm: 3px 3px 0 rgba(0,0,0,0.55);
        --shadow-card: none;
        --shadow-raised: 4px 4px 0 rgba(0,0,0,0.55);
        --hero: #262318;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--ink);
        /* SF(애플) 우선 시스템 폰트 스택 */
        font-family: -apple-system, BlinkMacSystemFont, ui-sans-serif, system-ui, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
        font-size: 17px;               /* iOS 본문 기본 */
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;   /* iOS 회색 탭 플래시 제거 */
        -webkit-text-size-adjust: 100%;
        transition: background 0.25s ease, color 0.25s ease;
      }
      /* iOS 터치 타깃 최소 44pt 권장 (HIG) */
      button { min-height: 44px; }
      /* 볼드 모던: 크고 무거운 타이포, 타이트 자간 */
      h1 { font-size: 32px; font-weight: 820; letter-spacing: -0.035em; line-height: 1.08; }
      h2 { font-size: 20px; font-weight: 780; letter-spacing: -0.02em; }
      /* 섹션 라벨(키커) — 굵고 또렷하게 */
      .ym-kicker { font-size: 12px; font-weight: 800; letter-spacing: 0.02em; color: var(--ink); display: inline-flex; align-items: center; gap: 7px; }
      .ym-kicker::before { content: ''; width: 12px; height: 12px; background: var(--accent); border-radius: 3px; display: inline-block; }
      /* 구분선 */
      .ym-rule { height: 1px; background: var(--line); border: 0; margin: 0; }
      /* 하드섀도 버튼/블록 — 누르면 섀도 안으로 들어가는 청키 인터랙션 */
      .ym-pop { box-shadow: var(--shadow-pop); transition: transform 0.06s ease, box-shadow 0.06s ease; }
      .ym-pop:not(:disabled):active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
      .ym-pop-sm { box-shadow: var(--shadow-pop-sm); transition: transform 0.06s ease, box-shadow 0.06s ease; }
      .ym-pop-sm:not(:disabled):active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
      button { font-family: inherit; transition: transform 0.08s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease; }
      button:not(:disabled):active { transform: translateY(1px) scale(0.995); }

      /* 마이크로 인터랙션 — 학습 피드백 강화 (CSS only) */
      @keyframes ym-pop { 0% { transform: scale(1); } 40% { transform: scale(1.04); } 100% { transform: scale(1); } }
      @keyframes ym-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
      @keyframes ym-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes ym-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes ym-burst { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes ym-confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(120px) rotate(360deg); opacity: 0; } }
      @keyframes ym-wave { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
      .ym-correct { animation: ym-pop 0.32s ease; }
      .ym-wrong { animation: ym-shake 0.36s ease; }
      .ym-reveal { animation: ym-fade-in 0.28s ease both; }
      .ym-listening { animation: ym-pulse 1s ease-in-out infinite; }
      .ym-burst { animation: ym-burst 0.5s cubic-bezier(.2,.7,.3,1.2) both; }
      .ym-confetti span { position: absolute; top: 0; font-size: 18px; animation: ym-confetti 1.1s ease-in forwards; }
      /* 음파 막대 — 듣기 카드 "재생 중" 표시 */
      .ym-wave { display: inline-flex; align-items: center; gap: 4px; height: 40px; }
      .ym-wave i { display: block; width: 5px; height: 100%; border-radius: 3px; background: var(--accent); transform-origin: center; animation: ym-wave 0.9s ease-in-out infinite; }
      .ym-wave i:nth-child(1) { animation-delay: 0s; }
      .ym-wave i:nth-child(2) { animation-delay: 0.15s; }
      .ym-wave i:nth-child(3) { animation-delay: 0.3s; }
      .ym-wave i:nth-child(4) { animation-delay: 0.45s; }
      .ym-wave i:nth-child(5) { animation-delay: 0.6s; }
      @media (prefers-reduced-motion: reduce) {
        .ym-correct, .ym-wrong, .ym-reveal, .ym-listening, .ym-burst { animation: none; }
        .ym-confetti span { display: none; }
        .ym-wave i { animation: none; transform: scaleY(0.7); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
