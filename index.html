<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>yangmung</title>
    <style>
      /* ── 디자인 토큰 (주간/야간) — 볼드 모던: 화이트+잉크+朱, 굵은 테두리·하드 섀도 ── */
      :root {
        --bg: #f4f3ed;
        --surface: #ffffff;
        --surface-2: #edeae1;
        --ink: #15140f;           /* 잉크(고대비) */
        --ink-soft: #57544c;
        --ink-faint: #948f84;
        --line: #e0dcd0;          /* 약한 구분선 */
        --border: #15140f;        /* 청키 테두리 = 잉크 */
        --accent: #b9382e;        /* 朱 (볼드) */
        --accent-soft: #fbe8e5;
        --accent-ink: #ffffff;
        --ok: #2f7d4f; --ok-soft: #e3f0e6;
        --warn: #9a6a16; --warn-soft: #f4ecd6;
        --shadow-pop: 4px 4px 0 var(--ink);      /* 하드 오프셋 섀도 (청키 팝) */
        --shadow-pop-sm: 3px 3px 0 var(--ink);
        --shadow-card: none;
        --shadow-raised: 4px 4px 0 var(--ink);
        --hero: #15140f;
        /* Liquid Glass 레이어 (라이트) */
        --glass-bg: rgba(255,255,255,0.55);
        --glass-bg-strong: rgba(255,255,255,0.72);
        --glass-border: rgba(255,255,255,0.7);
        --glass-hi: rgba(255,255,255,0.9);
        --glass-shadow: 0 8px 30px rgba(40,30,20,0.10), 0 2px 8px rgba(40,30,20,0.06);
        --glass-blur: 22px;
        /* 앰비언트 배경 블롭 */
        --amb-1: rgba(185,56,46,0.16);   /* 朱 */
        --amb-2: rgba(70,120,200,0.14);  /* cool */
        --amb-3: rgba(220,160,60,0.12);  /* warm */
      }
      [data-theme="dark"] {
        --bg: #100f0b;
        --surface: #1b1913;
        --surface-2: #262318;
        --ink: #f3efe6;
        --ink-soft: #aaa698;
        --ink-faint: #6f6b5e;
        --line: #2c2920;
        --border: #4f4b3f;        /* 다크에선 보이는 중간 테두리 */
        --accent: #e2655a;
        --accent-soft: #2c1c19;
        --accent-ink: #15140f;
        --ok: #4cae79; --ok-soft: #18241c;
        --warn: #d2a14a; --warn-soft: #271f12;
        --shadow-pop: 4px 4px 0 rgba(0,0,0,0.55);
        --shadow-pop-sm: 3px 3px 0 rgba(0,0,0,0.55);
        --shadow-card: none;
        --shadow-raised: 4px 4px 0 rgba(0,0,0,0.55);
        --hero: #262318;
        /* Liquid Glass 레이어 (다크) */
        --glass-bg: rgba(40,38,30,0.45);
        --glass-bg-strong: rgba(45,42,33,0.62);
        --glass-border: rgba(255,255,255,0.12);
        --glass-hi: rgba(255,255,255,0.16);
        --glass-shadow: 0 10px 34px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.4);
        --glass-blur: 22px;
        --amb-1: rgba(226,101,90,0.18);
        --amb-2: rgba(90,140,220,0.16);
        --amb-3: rgba(220,170,90,0.10);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--ink);
        /* SF(애플) 우선 시스템 폰트 스택 */
        font-family: -apple-system, BlinkMacSystemFont, ui-sans-serif, system-ui, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
        font-size: 17px;               /* iOS 본문 기본 */
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;   /* iOS 회색 탭 플래시 제거 */
        -webkit-text-size-adjust: 100%;
        transition: background 0.25s ease, color 0.25s ease;
      }
      /* 앰비언트 배경 — 글래스가 굴절할 부드러운 색 블롭 (고정) */
      .ym-ambient { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
      .ym-ambient::before, .ym-ambient::after {
        content: ''; position: absolute; border-radius: 50%; filter: blur(60px);
      }
      .ym-ambient::before { width: 60vw; height: 60vw; top: -12vh; right: -18vw;
        background: radial-gradient(circle at center, var(--amb-1), transparent 70%); }
      .ym-ambient::after { width: 66vw; height: 66vw; bottom: -16vh; left: -20vw;
        background: radial-gradient(circle at center, var(--amb-2), transparent 70%); }
      .ym-ambient i { position: absolute; width: 50vw; height: 50vw; left: 30vw; top: 32vh;
        border-radius: 50%; filter: blur(60px);
        background: radial-gradient(circle at center, var(--amb-3), transparent 70%); }
      /* Liquid Glass 머티리얼 */
      .ym-glass {
        background: var(--glass-bg);
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
        backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-hi);
        border-radius: 24px;
      }
      .ym-glass-strong { background: var(--glass-bg-strong); }
      /* 스프링 등장 모션 + 누름 반응 */
      @keyframes ym-rise { from { opacity: 0; transform: translateY(16px) scale(0.985); } to { opacity: 1; transform: none; } }
      .ym-rise { animation: ym-rise 0.5s cubic-bezier(.2,.8,.2,1) both; }
      .ym-press { transition: transform 0.12s cubic-bezier(.2,.8,.2,1), box-shadow 0.15s ease; }
      .ym-press:not(:disabled):active { transform: scale(0.965); }
      /* iOS 터치 타깃 최소 44pt 권장 (HIG) */
      button { min-height: 44px; }
      /* 볼드 모던: 크고 무거운 타이포, 타이트 자간 */
      h1 { font-size: 32px; font-weight: 820; letter-spacing: -0.035em; line-height: 1.08; }
      h2 { font-size: 20px; font-weight: 780; letter-spacing: -0.02em; }
      /* 섹션 라벨(키커) — 굵고 또렷하게 */
      .ym-kicker { font-size: 12px; font-weight: 800; letter-spacing: 0.02em; color: var(--ink); display: inline-flex; align-items: center; gap: 7px; }
      .ym-kicker::before { content: ''; width: 12px; height: 12px; background: var(--accent); border-radius: 3px; display: inline-block; }
      /* 구분선 */
      .ym-rule { height: 1px; background: var(--line); border: 0; margin: 0; }
      /* 하드섀도 버튼/블록 — 누르면 섀도 안으로 들어가는 청키 인터랙션 */
      .ym-pop { box-shadow: var(--shadow-pop); transition: transform 0.06s ease, box-shadow 0.06s ease; }
      .ym-pop:not(:disabled):active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
      .ym-pop-sm { box-shadow: var(--shadow-pop-sm); transition: transform 0.06s ease, box-shadow 0.06s ease; }
      .ym-pop-sm:not(:disabled):active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
      button { font-family: inherit; transition: transform 0.08s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease; }
      button:not(:disabled):active { transform: translateY(1px) scale(0.995); }

      /* 마이크로 인터랙션 — 학습 피드백 강화 (CSS only) */
      @keyframes ym-pop { 0% { transform: scale(1); } 40% { transform: scale(1.04); } 100% { transform: scale(1); } }
      @keyframes ym-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
      @keyframes ym-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes ym-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes ym-burst { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes ym-confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(120px) rotate(360deg); opacity: 0; } }
      @keyframes ym-wave { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
      /* 장면 진입 — 헤더 배경은 스케일 페이드, 학습 시트는 아래에서 떠오름 */
      @keyframes ym-scene-bg { from { opacity: 0; transform: scale(1.06); } to { opacity: 1; transform: none; } }
      @keyframes ym-sheet-up { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: none; } }
      .ym-scene-bg { animation: ym-scene-bg 0.55s cubic-bezier(.2,.8,.2,1) both; }
      .ym-sheet-up { animation: ym-sheet-up 0.5s cubic-bezier(.2,.8,.2,1) both; }
      /* 가챠 개봉 — 상자 흔들→팝, 카드 플립 등장, 글로우 펄스 */
      @keyframes ym-chest { 0%{transform:scale(.92) rotate(0)} 18%{transform:scale(1) rotate(-5deg)} 34%{transform:scale(1.02) rotate(5deg)} 52%{transform:scale(1.02) rotate(-4deg)} 70%{transform:scale(1.06) rotate(3deg)} 100%{transform:scale(1.18); opacity:0} }
      @keyframes ym-card-in { from{opacity:0; transform:translateY(18px) scale(.7) rotate(-7deg)} to{opacity:1; transform:none} }
      @keyframes ym-item-out { 0%{opacity:0; transform:translateY(150px) scale(.25) rotate(-9deg)} 62%{opacity:1; transform:translateY(-12px) scale(1.08) rotate(2deg)} 100%{opacity:1; transform:none} }
      @keyframes ym-glow { 0%,100%{opacity:.35; transform:scale(.9)} 50%{opacity:.9; transform:scale(1.08)} }
      @keyframes ym-gacha-spark { 0%{opacity:0; transform:translate(-50%, -50%) scale(.2) rotate(0)} 18%{opacity:1} 100%{opacity:0; transform:translate(var(--dx, 0), -110px) scale(1.2) rotate(240deg)} }
      @keyframes ym-gacha-rays { 0%{opacity:0; transform:scale(.6) rotate(0)} 22%{opacity:.9} 100%{opacity:.18; transform:scale(1.18) rotate(18deg)} }
      @keyframes ym-gacha-box-hit { 0%{transform:translateY(0) rotate(0) scale(1)} 22%{transform:translateY(-8px) rotate(-8deg) scale(1.08)} 44%{transform:translateY(3px) rotate(7deg) scale(1.03)} 72%{transform:translateY(-3px) rotate(-4deg) scale(1.06)} 100%{transform:translateY(0) rotate(0) scale(1)} }
      @keyframes ym-gacha-shockwave { 0%{opacity:.9; transform:translate(-50%,-50%) scale(.18)} 70%{opacity:.3} 100%{opacity:0; transform:translate(-50%,-50%) scale(1.45)} }
      @keyframes ym-gacha-runes { from{background-position:0 0; opacity:.16} to{background-position:0 -120px; opacity:.32} }
      @keyframes ym-game-card-pop { 0%{opacity:0; transform:perspective(600px) translateY(116px) rotateX(68deg) scale(.34)} 46%{opacity:1; transform:perspective(600px) translateY(-24px) rotateX(-10deg) scale(1.12)} 70%{transform:perspective(600px) translateY(6px) rotateX(4deg) scale(.98)} 100%{opacity:1; transform:perspective(600px) translateY(0) rotateX(0) scale(1)} }
      @keyframes ym-game-card-shine { from{transform:translateX(-130%) rotate(18deg)} to{transform:translateX(155%) rotate(18deg)} }
      @keyframes ym-game-card-float { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-4px) rotate(1deg)} }
      @keyframes ym-speed-lines { from{transform:translate3d(-20px,-18px,0); opacity:.12} to{transform:translate3d(20px,18px,0); opacity:.2} }
      @keyframes ym-speed-card-good { 0%{transform:scale(1)} 42%{transform:scale(1.018)} 100%{transform:scale(1)} }
      @keyframes ym-speed-card-perfect { 0%{transform:scale(.995)} 34%{transform:scale(1.035)} 66%{transform:scale(.996)} 100%{transform:scale(1)} }
      @keyframes ym-speed-callout { 0%{opacity:0; transform:translate(-50%,-2px) scale(.82)} 36%{opacity:1; transform:translate(-50%,-16px) scale(1.08)} 100%{opacity:1; transform:translate(-50%,-13px) scale(1)} }
      @keyframes ym-speed-spark { 0%{opacity:0; transform:translate(-50%,-50%) rotate(var(--fx-rot)) translateX(20px) scaleX(.4)} 22%{opacity:1} 100%{opacity:0; transform:translate(-50%,-50%) rotate(var(--fx-rot)) translateX(92px) scaleX(1)} }
      @keyframes ym-answer-correct { 0%{transform:scale(1)} 34%{transform:scale(1.045)} 100%{transform:scale(1)} }
      @keyframes ym-answer-wrong { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
      @keyframes ym-timer-shine { from{transform:translateX(-120%)} to{transform:translateX(190%)} }
      .ym-chest { animation: ym-chest 0.9s cubic-bezier(.3,.7,.4,1) forwards; }
      .ym-card-in { animation: ym-card-in 0.5s cubic-bezier(.2,.9,.3,1.2) both; }
      .ym-item-out { animation: ym-item-out 0.72s cubic-bezier(.16,.88,.25,1.18) both; }
      .ym-glow { animation: ym-glow 1s ease-in-out infinite; }
      .ym-gacha-spark { position: absolute; animation: ym-gacha-spark 1.15s cubic-bezier(.2,.8,.2,1) both; }
      .ym-gacha-spark:nth-child(3n) { --dx: -90px; }
      .ym-gacha-spark:nth-child(3n+1) { --dx: 20px; }
      .ym-gacha-spark:nth-child(3n+2) { --dx: 90px; }
      .ym-gacha-rays {
        background:
          conic-gradient(from 0deg, transparent 0 8deg, currentColor 8deg 13deg, transparent 13deg 32deg, currentColor 32deg 37deg, transparent 37deg 60deg, currentColor 60deg 65deg, transparent 65deg 90deg);
        clip-path: circle(50%);
        filter: blur(.2px);
        animation: ym-gacha-rays 0.9s cubic-bezier(.2,.8,.2,1) both;
      }
      .ym-gacha-stage { overflow: hidden; isolation: isolate; }
      .ym-gacha-stage::before {
        content: ''; position: absolute; inset: -20%; pointer-events: none; opacity: .42;
        background:
          radial-gradient(circle at 50% 42%, var(--gacha-color, #f0a23a) 0 1px, transparent 2px),
          radial-gradient(circle at 25% 20%, rgba(255,255,255,.42), transparent 14%),
          radial-gradient(circle at 75% 72%, var(--gacha-color, #f0a23a), transparent 16%);
        filter: blur(.2px);
      }
      .ym-gacha-stage.is-burst::before { opacity: .72; }
      .ym-gacha-runes {
        position: absolute; inset: 0; pointer-events: none; opacity: .18;
        background-image:
          linear-gradient(115deg, transparent 0 44%, rgba(255,255,255,.14) 45% 46%, transparent 47% 100%),
          radial-gradient(circle at 20% 20%, var(--gacha-color, #f0a23a) 0 1px, transparent 2px),
          radial-gradient(circle at 82% 42%, rgba(255,255,255,.76) 0 1px, transparent 2px);
        background-size: 96px 96px, 84px 84px, 112px 112px;
        animation: ym-gacha-runes 2.2s linear infinite;
      }
      .ym-gacha-box-hit { animation: ym-gacha-box-hit .34s cubic-bezier(.2,.9,.28,1.35) both; filter: drop-shadow(0 0 22px var(--gacha-color, #f0a23a)); }
      .ym-yumebox {
        position: relative; display: inline-flex; align-items: center; justify-content: center;
        filter: drop-shadow(0 18px 28px color-mix(in srgb, var(--box-grade, #f0a23a), transparent 42%));
      }
      .ym-yumebox::before {
        content: ''; position: absolute; inset: 12%; border-radius: 999px; z-index: -1;
        background: radial-gradient(circle, color-mix(in srgb, var(--box-grade, #f0a23a), #fff 20%), transparent 68%);
        opacity: .55; filter: blur(10px); animation: ym-glow 1.4s ease-in-out infinite;
      }
      .ym-yumebox img { width: 100%; height: 100%; object-fit: contain; display: block; }
      .ym-yumebox.is-open { filter: drop-shadow(0 0 30px var(--box-grade, #f0a23a)) drop-shadow(0 20px 34px rgba(0,0,0,.35)); }
      .ym-yumebox.is-open img { animation: ym-game-card-float 1.35s ease-in-out infinite; }
      .ym-gacha-shockwave {
        position: absolute; left: 50%; top: 45%; width: min(84vw, 460px); height: min(84vw, 460px); border-radius: 50%;
        border: 3px solid var(--gacha-color, #f0a23a); box-shadow: 0 0 36px var(--gacha-color, #f0a23a), inset 0 0 28px rgba(255,255,255,.35);
        animation: ym-gacha-shockwave .82s ease-out both; pointer-events: none;
      }
      .ym-game-item-face::before {
        content: ''; position: absolute; inset: -16%; border-radius: inherit;
        background: radial-gradient(circle at 30% 22%, rgba(255,255,255,.84), transparent 22%), linear-gradient(135deg, transparent 20%, rgba(255,255,255,.36), transparent 42%);
        mix-blend-mode: screen; pointer-events: none;
      }
      .ym-game-item-face::after {
        content: ''; position: absolute; inset: 7%; border-radius: 21%;
        border: 2px solid color-mix(in srgb, var(--tier-color, #f0a23a), #fff 30%);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,.34);
        pointer-events: none;
      }
      .ym-game-item-star { position: absolute; color: var(--tier-color, #f0a23a); text-shadow: 0 0 10px currentColor; z-index: 2; }
      .ym-gacha-reward-card {
        position: relative; display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 226px; max-width: 248px;
        padding: 21px 17px 17px; border-radius: 24px; color: #fff; overflow: hidden;
        border: 2px solid color-mix(in srgb, var(--reward-color, #f0a23a), #fff 18%);
        background:
          linear-gradient(135deg, rgba(255,255,255,.2), transparent 26%),
          radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--reward-color, #f0a23a), #fff 20%), transparent 42%),
          linear-gradient(180deg, #242335, #101018 66%, #090910);
        box-shadow: 0 0 0 4px rgba(255,255,255,.08), 0 0 46px color-mix(in srgb, var(--reward-color, #f0a23a), transparent 32%), 0 22px 60px rgba(0,0,0,.56);
        animation: ym-game-card-pop .76s cubic-bezier(.16,.88,.25,1.18) both, ym-game-card-float 1.8s ease-in-out .84s infinite;
      }
      .ym-gacha-reward-card::before {
        content: ''; position: absolute; top: -20%; bottom: -20%; width: 46%; left: -54%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,.48), transparent);
        animation: ym-game-card-shine .82s ease-out .28s both; pointer-events: none;
      }
      .ym-gacha-reward-card::after {
        content: ''; position: absolute; inset: 8px; border-radius: 18px; border: 1px dashed rgba(255,255,255,.24); pointer-events: none;
      }
      .ym-gacha-reward-badge {
        position: absolute; top: 10px; left: 12px; padding: 3px 7px; border-radius: 999px;
        background: rgba(0,0,0,.34); border: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.82);
        font-size: 10px; font-weight: 900; letter-spacing: .06em;
      }
      .ym-gacha-reward-place { margin-top: 2px; color: var(--reward-color, #f0a23a); font-size: 12px; font-weight: 950; letter-spacing: .04em; text-transform: uppercase; }
      .ym-gacha-reward-type { padding: 3px 8px; border-radius: 999px; background: rgba(255,255,255,.12); color: rgba(255,255,255,.76); font-size: 10px; font-weight: 900; letter-spacing: .08em; }
      .ym-gacha-reward-ja { max-width: 210px; font-size: 20px; line-height: 1.35; font-weight: 950; text-align: center; text-shadow: 0 2px 12px rgba(0,0,0,.42); }
      .ym-gacha-reward-ko { max-width: 210px; font-size: 12px; line-height: 1.4; font-weight: 750; color: rgba(255,255,255,.72); text-align: center; }
      .ym-gacha-item-art {
        position: relative; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
        filter: drop-shadow(0 0 18px var(--reward-color, #f0a23a)) drop-shadow(0 18px 22px rgba(0,0,0,.3));
      }
      .ym-gacha-item-art::before {
        content: ''; position: absolute; inset: 9%; border-radius: 999px; z-index: -1;
        background: radial-gradient(circle, color-mix(in srgb, var(--reward-color, #f0a23a), #fff 22%), transparent 66%);
        opacity: .56; filter: blur(9px); animation: ym-glow 1.1s ease-in-out infinite;
      }
      .ym-gacha-item-art img { width: 100%; height: 100%; object-fit: contain; display: block; animation: ym-game-card-float 1.45s ease-in-out infinite; }
      .ym-gacha-item-art.is-level-up-token::before { opacity: .78; }
      .ym-flash-arena::before {
        content: ''; position: absolute; inset: 0; pointer-events: none; opacity: .72;
        background:
          radial-gradient(circle at 50% 18%, rgba(240,162,58,.14), transparent 30%),
          radial-gradient(circle at 82% 6%, rgba(185,56,46,.12), transparent 22%),
          linear-gradient(180deg, transparent 0 58%, color-mix(in srgb, var(--accent), transparent 94%) 100%);
      }
      .ym-flash-arena.is-hot::before { opacity: .9; }
      .ym-speed-lines {
        position: absolute; inset: -80px -30px; pointer-events: none; opacity: .16;
        background:
          repeating-linear-gradient(112deg, transparent 0 22px, rgba(255,255,255,.12) 22px 24px, transparent 24px 58px),
          repeating-linear-gradient(78deg, transparent 0 34px, color-mix(in srgb, var(--accent), transparent 86%) 34px 36px, transparent 36px 76px);
        animation: ym-speed-lines 1.1s linear infinite;
        will-change: transform, opacity;
      }
      .ym-flash-arena.is-low .ym-speed-lines { opacity: .34; }
      .ym-speed-hud {

      .ym-speed-time {

      }
      .ym-speed-callout {
        position: absolute; top: 2px; left: 50%; z-index: 3; padding: 4px 12px; border-radius: 999px;

      .ym-speed-callout.is-miss { background: linear-gradient(135deg, #e2655a, #b9382e); box-shadow: 0 0 16px rgba(226,101,90,.4); }
      .ym-speed-hitfx { position: absolute; inset: 0; pointer-events: none; overflow: visible; z-index: 2; }
      .ym-speed-hitfx i {
        position: absolute; left: 50%; top: 48%; width: 26px; height: 3px; border-radius: 999px;
        background: linear-gradient(90deg, transparent, var(--fx-color, #f0a23a), transparent); box-shadow: 0 0 12px var(--fx-color, #f0a23a);

      .ym-speed-hitfx.is-miss i { width: 22px; height: 3px; background: var(--fx-color, #e0564a); }
      .ym-answer-correct { animation: ym-answer-correct .28s cubic-bezier(.2,.9,.3,1.1) both; box-shadow: 0 0 16px rgba(76,174,121,.24); }
      .ym-answer-wrong { animation: ym-answer-wrong .28s ease both; }
      .ym-correct { animation: ym-pop 0.32s ease; }
      .ym-wrong { animation: ym-shake 0.36s ease; }
      .ym-reveal { animation: ym-fade-in 0.28s ease both; }
      .ym-listening { animation: ym-pulse 1s ease-in-out infinite; }
      .ym-burst { animation: ym-burst 0.5s cubic-bezier(.2,.7,.3,1.2) both; }
      .ym-confetti span { position: absolute; top: 0; font-size: 18px; animation: ym-confetti 1.1s ease-in forwards; }
      /* 음파 막대 — 듣기 카드 "재생 중" 표시 */
      .ym-wave { display: inline-flex; align-items: center; gap: 4px; height: 40px; }
      .ym-wave i { display: block; width: 5px; height: 100%; border-radius: 3px; background: var(--accent); transform-origin: center; animation: ym-wave 0.9s ease-in-out infinite; }
      .ym-wave i:nth-child(1) { animation-delay: 0s; }

      .ym-wave i:nth-child(3) { animation-delay: 0.3s; }
      .ym-wave i:nth-child(4) { animation-delay: 0.45s; }

        .ym-speed-lines, .ym-gacha-runes, .ym-gacha-shockwave, .ym-speed-hitfx { display: none; }

      }
    </style>
